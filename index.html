  // ── Hooks ─────────────────────────────────────────────────────────────────
  function usePressable() {
    const [p, setP] = useState(false);
    return { pressed: p, bind: { onMouseDown: () => setP(true), onMouseUp: () => setP(false), onMouseLeave: () => setP(false), onTouchStart: () => setP(true), onTouchEnd: () => setP(false) } };
  }

  // ── Components ────────────────────────────────────────────────────────────
  function CircleBtn({ active, color, size = 30, fsize = 14, children, onClick }) {
    const { pressed: p, bind } = usePressable();
    return <button onClick={onClick} {...bind} style={{ width: size, height: size, borderRadius: "50%", background: active ? color : "transparent", border: "2px solid " + color, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, color: active ? "#fff" : color, fontSize: fsize, fontWeight: 700, boxShadow: p ? "none" : active ? "0 0 12px " + color + "44" : "0 1px 4px rgba(0,0,0,.6)", transform: p ? "scale(.84)" : "scale(1)", transition: "all .12s ease", cursor: "pointer" }}>{children}</button>;
  }
  function BtnPrimary({ children, onClick, disabled, color, noTop }) {
    const { pressed: p, bind } = usePressable();
    const bg = color || C.blue;

    const [addProjOpen, setAddProjOpen] = useState(false);
    const [addSubId, setAddSubId] = useState(null);
    const [projForm, setProjForm] = useState({ name: "", date: "", time: "" });
    const [subForm, setSubForm] = useState({ name: "", date: "", time: "" });
    const [previewTpl, setPreviewTpl] = useState(null);
    const [imported, setImported] = useState({});
    const [fbType, setFbType] = useState("sugestao");
    const [fbMsg, setFbMsg] = useState("");
    const [fbEmail, setFbEmail] = useState("");
    const [fbSent, setFbSent] = useState(false);
    const [joinCode, setJoinCode] = useState("");
    const [copied, setCopied] = useState(false);

    const tRef = db.collection("workspaces").doc(wsId).collection("tasks");
    const actionTask = tasks.find(t => t.id === actionId);

    // ── Firestore sync ──
    useEffect(() => {
      setSyncing(true);
      const unsub = tRef.onSnapshot(snap => {
        const t = snap.docs.map(d => ({ ...d.data(), id: parseInt(d.id) }));
        setTasks(t);
        if (t.length) uid = Math.max(...t.map(x => x.id)) + 1;
        setSyncing(false);
      });
      return unsub;
    }, [wsId]);

    // ── Mutations ──
    const toggle = id => {
      setFading(id);
      const task = tasks.find(t => t.id === id);
      if (task) tRef.doc(String(id)).set({ ...task, completed: !task.completed });
      setTimeout(() => setFading(null), 340);
    };
    const del = () => {
      tRef.doc(String(actionId)).delete();
      tasks.filter(t => t.parentId === actionId).forEach(t => tRef.doc(String(t.id)).delete());
      setDeleteOpen(false); setActionId(null);
    };
    const snooze = (date, time) => {
      const task = tasks.find(t => t.id === actionId);
      if (task) tRef.doc(String(actionId)).set({ ...task, date, time: time || null, completed: false });
      setSnoozeOpen(false); setActionId(null);
    };
    const addTask = () => {
      if (!form.name.trim()) return;
      const t = { id: uid++, name: form.name.trim(), date: form.date || null, time: form.time || null, parentId: form.parentId ? parseInt(form.parentId) : null, completed: false };
      tRef.doc(String(t.id)).set(t);
      setForm({ name: "", date: TODAY, time: "", parentId: "" }); setAddOpen(false);
    };
    const addProj = () => {
      if (!projForm.name.trim()) return;
      const t = { id: uid++, name: projForm.name.trim(), date: projForm.date || null, time: projForm.time || null, parentId: null, completed: false };
      tRef.doc(String(t.id)).set(t);
      setProjForm({ name: "", date: "", time: "" }); setAddProjOpen(false);
    };
    const addSub = () => {
      if (!subForm.name.trim()) return;
      const t = { id: uid++, name: subForm.name.trim(), date: subForm.date || null, time: subForm.time || null, parentId: addSubId, completed: false };
      tRef.doc(String(t.id)).set(t);
      setSubForm({ name: "", date: "", time: "" }); setAddSubId(null);
    };
    const importTpl = tpl => {
      const pid = uid++;
      const batch = db.batch();
      batch.set(tRef.doc(String(pid)), { id: pid, name: tpl.name, date: null, time: null, parentId: null, completed: false });
      tpl.tasks.forEach(t => { const sid = uid++; batch.set(tRef.doc(String(sid)), { id: sid, name: t.name, date: null, time: t.time || null, parentId: pid, completed: false }); });
      batch.commit();
      setImported(p => ({ ...p, [tpl.id]: true })); setPreviewTpl(null);
    };
    const sendFb = () => {
      const s = encodeURIComponent("[" + fbType + "] Feedback");
      const b = encodeURIComponent(fbMsg + "\n\nEmail: " + (fbEmail || "não informado"));
      window.open("mailto:contato@selfdo.app?subject=" + s + "&body=" + b);
      setFbSent(true); setTimeout(() => setFbSent(false), 3500);
    };
    const copyCode = () => {
      if (navigator.clipboard) navigator.clipboard.writeText(wsId).catch(function() {});
      setCopied(true); setTimeout(() => setCopied(false), 2500);
    };
    const handleJoin = () => {
      const code = joinCode.trim().toUpperCase();
      if (code.length < 3) return;
      localStorage.setItem(WS_KEY, code); setWsId(code); setJoinCode("");
    };

    const sorted = [...tasks].sort((a, b) => { const d = getStatus(a) - getStatus(b); return d !== 0 ? d : (a.date && b.date ? a.date.localeCompare(b.date) : 0); });
    const groups = sorted.reduce((acc, t) => { const s = getStatus(t); if (!acc[s]) acc[s] = []; acc[s].push(t); return acc; }, {});
    const parents = tasks.filter(t => !t.parentId);

    return (
      <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif", maxWidth: 430, margin: "0 auto", paddingBottom: 92 }}>

        {/* HOJE */}
        {page === "hoje" && <div>
          <div style={{ padding: "52px 20px 14px", display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
            <div>
              <div style={{ fontSize: 13, color: C.muted, display: "flex", alignItems: "center", gap: 7 }}>
                {new Date().toLocaleDateString("pt-BR", { weekday: "long", day: "numeric", month: "long" })}
                {syncing && <span style={{ width: 6, height: 6, borderRadius: "50%", background: C.blue, display: "inline-block", flexShrink: 0 }} />}
              </div>
              <h1 style={{ margin: "3px 0 0", fontSize: 34, fontWeight: 700, letterSpacing: -.5 }}>Hoje</h1>
            </div>
            <PlusBtn onClick={() => setAddOpen(true)} />
          </div>
          <div style={{ padding: "0 16px", display: "flex", flexDirection: "column", gap: 10 }}>
            {[ST.OVERDUE, ST.TODAY, ST.FUTURE, ST.DONE].map(status => {
              const grp = groups[status];
              if (!grp || !grp.length) return null;
              return <div key={status}><div style={{ fontSize: 12, color: C.muted, letterSpacing: .5, textTransform: "uppercase", fontWeight: 600, padding: "8px 4px 6px" }}>{ST_LABEL[status]}</div><div style={{ background: C.card, borderRadius: 14, overflow: "hidden", boxShadow: "0 2px 14px rgba(0,0,0,.45)" }}>{grp.map((t, i) => <div key={t.id}>{i > 0 && <div style={{ height: "0.5px", background: C.border, marginLeft: 59 }} />}<TaskRow task={t} tasks={tasks} fading={fading} onAction={id => { setActionId(id); setSnoozeOpen(false); setDeleteOpen(false); }} onToggle={toggle} /></div>)}</div></div>;
            })}
            {!syncing && !tasks.length && <div style={{ textAlign: "center", padding: "80px 20px", color: C.muted }}><div style={{ fontSize: 44, marginBottom: 12 }}>✓</div><div style={{ fontSize: 17 }}>Nenhuma tarefa</div><div style={{ fontSize: 14, marginTop: 6 }}>Toque em + para adicionar</div></div>}
          </div>
        </div>}

        {/* PROJETOS */}
        {page === "projetos" && <div>
          <div style={{ padding: "52px 20px 14px", display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
            <h1 style={{ margin: 0, fontSize: 34, fontWeight: 700, letterSpacing: -.5 }}>Projetos</h1>
            <PlusBtn onClick={() => setAddProjOpen(true)} />
          </div>
          <div style={{ padding: "0 16px", display: "flex", flexDirection: "column", gap: 14 }}>
            {parents.map(proj => {
              const subs = tasks.filter(t => t.parentId === proj.id);
              const doneCnt = subs.filter(t => t.completed).length;
              const pct = subs.length > 0 ? (doneCnt / subs.length) * 100 : 0;
              return <div key={proj.id} style={{ background: C.card, borderRadius: 16, overflow: "hidden", boxShadow: "0 2px 16px rgba(0,0,0,.5)" }}>
                <div style={{ padding: "16px 16px 10px", display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ flex: 1 }}><div style={{ fontSize: 17, fontWeight: 600, color: proj.completed ? C.muted : C.text, textDecoration: proj.completed ? "line-through" : "none" }}>{proj.name}</div><div style={{ display: "flex", gap: 10, marginTop: 2 }}>{proj.date && <span style={{ fontSize: 13, color: C.sub }}>{fmtDate(proj.date, proj.time)}</span>}{subs.length > 0 && <span style={{ fontSize: 13, color: C.sub }}>{doneCnt}/{subs.length}</span>}</div></div>
                  <CircleBtn active={proj.completed} color={C.green} size={30} fsize={14} onClick={() => toggle(proj.id)}>✓</CircleBtn>
                </div>
                {subs.length > 0 && <div style={{ margin: "0 16px 10px", height: 4, background: C.card2, borderRadius: 2, overflow: "hidden" }}><div style={{ width: pct + "%", height: "100%", background: pct === 100 ? C.green : C.blue, borderRadius: 2, transition: "width .4s ease" }} /></div>}
                {subs.map(s => <div key={s.id}><div style={{ height: "0.5px", background: C.border }} /><div style={{ display: "flex", alignItems: "center", padding: "11px 16px", gap: 12, opacity: s.completed ? .42 : 1, transition: "opacity .3s" }}><div style={{ flex: 1, minWidth: 0 }}><div style={{ fontSize: 15, color: s.completed ? C.muted : C.text, textDecoration: s.completed ? "line-through" : "none", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{s.name}</div>{s.date && <div style={{ fontSize: 12, color: C.sub, marginTop: 1 }}>{fmtDate(s.date, s.time)}</div>}</div><CircleBtn active={s.completed} color={C.green} size={26} fsize={12} onClick={() => toggle(s.id)}>✓</CircleBtn></div></div>)}
                <div style={{ height: "0.5px", background: C.border }} />
                <AddSubBtn onClick={() => setAddSubId(proj.id)} />
              </div>;
            })}
            {!parents.length && !syncing && <div style={{ textAlign: "center", padding: "80px 20px", color: C.muted }}><div style={{ fontSize: 44, marginBottom: 12 }}>📁</div><div style={{ fontSize: 17 }}>Nenhum projeto</div></div>}
          </div>
        </div>}

        {/* SUGESTÕES */}
        {page === "sugestoes" && <div>
          <div style={{ padding: "52px 20px 16px" }}><div style={{ fontSize: 13, color: C.muted }}>Pronto para usar</div><h1 style={{ margin: "3px 0 0", fontSize: 34, fontWeight: 700, letterSpacing: -.5 }}>Sugestões</h1></div>
          <div style={{ padding: "4px 16px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            {TEMPLATES.map(tpl => <TplCard key={tpl.id} tpl={tpl} isImported={!!imported[tpl.id]} onClick={() => setPreviewTpl(tpl)} />)}
          </div>
        </div>}

        {/* AJUSTES */}
        {page === "ajustes" && <div style={{ padding: "52px 20px 20px" }}>
          <div style={{ fontSize: 13, color: C.muted }}>Configurações</div>
          <h1 style={{ margin: "3px 0 20px", fontSize: 34, fontWeight: 700, letterSpacing: -.5 }}>Ajustes</h1>

          {/* Sync */}
          <div style={{ background: C.card, borderRadius: 16, overflow: "hidden", marginBottom: 20, boxShadow: "0 2px 14px rgba(0,0,0,.45)" }}>
            <div style={{ padding: "16px" }}>
              <div style={{ ...lS, marginBottom: 10 }}>Compartilhar lista</div>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
                <div style={{ fontSize: 32, fontWeight: 700, color: C.text, letterSpacing: 7, fontFamily: "monospace", flex: 1 }}>{wsId}</div>
                <SmallBtn onClick={copyCode}>{copied ? "✓ Ok" : "Copiar"}</SmallBtn>
              </div>
              <div style={{ fontSize: 12, color: C.sub }}>Compartilhe este código — qualquer pessoa com ele vê e edita a mesma lista em tempo real</div>
            </div>
            <div style={{ height: "0.5px", background: C.border }} />
            <div style={{ padding: "14px 16px" }}>
              <div style={{ ...lS, marginBottom: 8 }}>Entrar em outra lista</div>
              <div style={{ display: "flex", gap: 8 }}>
                <div style={{ ...fW, flex: 1 }}><input placeholder="Código (ex: A3K7X)" value={joinCode} onChange={e => setJoinCode(e.target.value.toUpperCase())} maxLength={5} style={{ ...iS, letterSpacing: 3 }} /></div>
                <SmallBtn onClick={handleJoin} disabled={joinCode.trim().length < 3}>Entrar</SmallBtn>
              </div>
            </div>
          </div>

          {/* Feedback */}
          {fbSent
            ? <div style={{ textAlign: "center", padding: "40px 20px" }}><div style={{ fontSize: 44, color: C.green, marginBottom: 12 }}>✓</div><div style={{ fontSize: 18, fontWeight: 600 }}>Obrigado!</div></div>
            : <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                <div><div style={lS}>Feedback</div><div style={{ display: "flex", gap: 8 }}>{FB_TYPES.map(opt => <TypePill key={opt.id} opt={opt} active={fbType === opt.id} onClick={() => setFbType(opt.id)} />)}</div></div>
                <div style={{ ...fW, borderRadius: 13 }}><textarea placeholder="Sua sugestão, problema ou dúvida..." value={fbMsg} onChange={e => setFbMsg(e.target.value)} style={{ ...iS, resize: "none", minHeight: 100 }} /></div>
                <div style={{ ...fW, borderRadius: 13 }}><input type="email" placeholder="Seu e-mail (opcional)" value={fbEmail} onChange={e => setFbEmail(e.target.value)} style={iS} /></div>
                <BtnPrimary onClick={sendFb} disabled={!fbMsg.trim()}>Enviar feedback</BtnPrimary>
                <div style={{ background: C.card, borderRadius: 14, overflow: "hidden", boxShadow: "0 2px 12px rgba(0,0,0,.35)" }}>{CONTACTS.map((item, i) => <ContactRow key={i} item={item} index={i} />)}</div>
                <div style={{ textAlign: "center", fontSize: 12, color: C.muted }}>Selfdo v1.0.0 · Feito com ♥ no Brasil</div>
              </div>
          }
        </div>}

        {/* NAV */}
        <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, background: "rgba(10,10,12,.96)", borderTop: "0.5px solid rgba(255,255,255,.1)", display: "flex", padding: "10px 0 26px" }}>
          {NAV.map(tab => <NavTab key={tab.id} {...tab} active={page === tab.id} onClick={() => setPage(tab.id)} />)}
        </div>

        {/* MODALS */}
        {addOpen && <Modal title="Nova Tarefa" onClose={() => setAddOpen(false)}><div style={fW}><input autoFocus placeholder="Nome da tarefa" value={form.name} onChange={e => setForm(p => ({ ...p, name: e.target.value }))} onKeyDown={e => e.key === "Enter" && addTask()} style={iS} /></div><div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}><div><label style={lS}>Data</label><div style={fW}><input type="date" value={form.date} onChange={e => setForm(p => ({ ...p, date: e.target.value }))} style={iS} /></div></div><div><label style={lS}>Hora</label><div style={fW}><input type="time" value={form.time} onChange={e => setForm(p => ({ ...p, time: e.target.value }))} style={iS} /></div></div></div><div><label style={lS}>Tarefa mãe</label><div style={fW}><select value={form.parentId} onChange={e => setForm(p => ({ ...p, parentId: e.target.value }))} style={{ ...iS, cursor: "pointer" }}><option value="">— Nenhuma —</option>{tasks.filter(t => !t.parentId && !t.completed).map(t => <option key={t.id} value={t.id}>{t.name}</option>)}</select></div></div><BtnPrimary onClick={addTask} disabled={!form.name.trim()}>Adicionar tarefa</BtnPrimary></Modal>}
        {actionId && !snoozeOpen && !deleteOpen && <Modal title={actionTask ? actionTask.name : ""} onClose={() => setActionId(null)}><ARow icon="⏰" label="Adiar tarefa" sub="Escolher nova data ou hora" onClick={() => setSnoozeOpen(true)} /><ARow icon="🗑" label="Excluir tarefa" danger onClick={() => setDeleteOpen(true)} /><BtnSecondary onClick={() => setActionId(null)}>Cancelar</BtnSecondary></Modal>}
        {snoozeOpen && <Modal title="Adiar para..." onClose={() => { setSnoozeOpen(false); setActionId(null); }}><ARow icon="🌙" label="Esta noite" sub="Hoje · 20:00" onClick={() => snooze(TODAY, "20:00")} /><ARow icon="☀️" label="Amanhã de manhã" sub={off(1) + " · 09:00"} onClick={() => snooze(off(1), "09:00")} /><ARow icon="📅" label="Próxima semana" sub={off(7)} onClick={() => snooze(off(7), null)} /><div style={{ ...fW, padding: "14px 16px", borderRadius: 13 }}><label style={lS}>Data personalizada</label><div style={{ display: "flex", gap: 10, marginBottom: 10 }}><div style={{ flex: 1, background: C.card3, borderRadius: 9, overflow: "hidden" }}><input type="date" value={customDate} onChange={e => setCustomDate(e.target.value)} style={{ ...iS, padding: "10px 12px" }} /></div><div style={{ flex: 1, background: C.card3, borderRadius: 9, overflow: "hidden" }}><input type="time" value={customTime} onChange={e => setCustomTime(e.target.value)} style={{ ...iS, padding: "10px 12px" }} /></div></div><BtnPrimary onClick={() => snooze(customDate, customTime || null)} noTop>Confirmar</BtnPrimary></div><BtnSecondary onClick={() => setSnoozeOpen(false)}>Voltar</BtnSecondary></Modal>}
        {deleteOpen && <Modal title="Excluir tarefa?" onClose={() => { setDeleteOpen(false); setActionId(null); }}><p style={{ color: C.sub, fontSize: 15, margin: "0 0 8px" }}>"{actionTask ? actionTask.name : ""}" será removida permanentemente.</p><BtnPrimary onClick={del} color={C.red}>Excluir permanentemente</BtnPrimary><BtnSecondary onClick={() => setDeleteOpen(false)}>Cancelar</BtnSecondary></Modal>}
        {addProjOpen && <Modal title="Novo Projeto" onClose={() => setAddProjOpen(false)}><div style={fW}><input autoFocus placeholder="Nome do projeto" value={projForm.name} onChange={e => setProjForm(p => ({ ...p, name: e.target.value }))} onKeyDown={e => e.key === "Enter" && addProj()} style={iS} /></div><div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}><div><label style={lS}>Data</label><div style={fW}><input type="date" value={projForm.date} onChange={e => setProjForm(p => ({ ...p, date: e.target.value }))} style={iS} /></div></div><div><label style={lS}>Hora</label><div style={fW}><input type="time" value={projForm.time} onChange={e => setProjForm(p => ({ ...p, time: e.target.value }))} style={iS} /></div></div></div><BtnPrimary onClick={addProj} disabled={!projForm.name.trim()}>Criar Projeto</BtnPrimary></Modal>}
        {addSubId && <Modal title="Nova Subtarefa" onClose={() => setAddSubId(null)}><div style={{ fontSize: 13, color: C.sub, marginBottom: 4 }}>em: {tasks.find(t => t.id === addSubId) ? tasks.find(t => t.id === addSubId).name : ""}</div><div style={fW}><input autoFocus placeholder="Nome da subtarefa" value={subForm.name} onChange={e => setSubForm(p => ({ ...p, name: e.target.value }))} onKeyDown={e => e.key === "Enter" && addSub()} style={iS} /></div><div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}><div><label style={lS}>Data</label><div style={fW}><input type="date" value={subForm.date} onChange={e => setSubForm(p => ({ ...p, date: e.target.value }))} style={iS} /></div></div><div><label style={lS}>Hora</label><div style={fW}><input type="time" value={subForm.time} onChange={e => setSubForm(p => ({ ...p, time: e.target.value }))} style={iS} /></div></div></div><BtnPrimary onClick={addSub} disabled={!subForm.name.trim()}>Adicionar</BtnPrimary></Modal>}
        {previewTpl && <Modal title={previewTpl.name} onClose={() => setPreviewTpl(null)}><div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}><div style={{ width: 32, height: 32, borderRadius: 8, background: previewTpl.color + "22", display: "flex", alignItems: "center", justifyContent: "center", color: previewTpl.color }}>{ICONS[previewTpl.icon]}</div><p style={{ color: C.sub, fontSize: 14, margin: 0 }}>{previewTpl.desc}</p></div><div style={{ background: C.card2, borderRadius: 13, overflow: "hidden" }}>{previewTpl.tasks.map((t, i) => <div key={i} style={{ padding: "11px 16px", borderBottom: i < previewTpl.tasks.length - 1 ? "0.5px solid " + C.card : "none", display: "flex", alignItems: "center", gap: 10 }}><div style={{ width: 18, height: 18, borderRadius: "50%", border: "1.5px solid " + C.muted, flexShrink: 0 }} /><div><div style={{ fontSize: 15, color: C.text }}>{t.name}</div>{t.time && <div style={{ fontSize: 12, color: C.sub }}>{t.time}</div>}</div></div>)}</div>{imported[previewTpl.id] ? <div style={{ background: C.muted, borderRadius: 13, padding: 14, textAlign: "center", fontSize: 16, color: "#fff", marginTop: 4 }}>✓ Já importado</div> : <BtnPrimary onClick={() => importTpl(previewTpl)}>Importar para Projetos</BtnPrimary>}<BtnSecondary onClick={() => setPreviewTpl(null)}>Cancelar</BtnSecondary></Modal>}
      </div>
    );
  }

  const boot = document.getElementById('boot');
  boot.style.opacity = '0';
  setTimeout(() => boot.remove(), 420);
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
